<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UniEdge 驱动器板卡配置平台</title>
<style>
:root{color-scheme:dark;--bg:#0b111b;--panel:#121a27;--panel2:#0f1724;--line:#253248;--line2:#31425f;--text:#edf5ff;--muted:#91a2bb;--blue:#2f81f7;--gold:#e7c477;--green:#22c55e;--red:#ff7b72;--chip:#1f2a3b}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% -10%,rgba(47,129,247,.25),transparent 30%),radial-gradient(circle at 92% 0,rgba(231,196,119,.15),transparent 28%),var(--bg);color:var(--text);font-family:Arial,'Microsoft YaHei',sans-serif}button,input,.file-label{font:inherit}button,.file-label{border:1px solid var(--line);border-radius:10px;padding:9px 13px;color:#fff;background:#1a2534;cursor:pointer}button:hover,.file-label:hover{border-color:#3d6fa8}.primary{border:0;background:linear-gradient(135deg,var(--blue),#1f6feb);font-weight:800}.danger{border-color:#7d3734;color:#ffd7d3;background:#3a2023}.ghost{background:transparent}.hidden{display:none!important}.app{max-width:1380px;margin:0 auto;padding:18px 14px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.brand{display:flex;align-items:center;gap:12px}.mark{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--gold));box-shadow:0 12px 26px rgba(47,129,247,.26)}h1{font-size:24px;margin:0}.sub,p{margin:4px 0;color:var(--muted)}.shell{display:grid;grid-template-columns:168px 1fr;gap:14px}.nav{border:1px solid rgba(148,163,184,.18);border-radius:18px;background:linear-gradient(180deg,rgba(18,26,39,.97),rgba(12,18,28,.98));padding:12px;min-height:680px;box-shadow:0 20px 70px rgba(0,0,0,.22)}.nav-title{font-size:13px;color:var(--muted);margin:4px 4px 12px}.nav-btn{width:100%;text-align:left;margin-bottom:8px;border-radius:14px;background:#0e1624;padding:13px 12px;font-weight:800}.nav-btn.active{background:linear-gradient(135deg,rgba(47,129,247,.32),rgba(231,196,119,.10));border-color:#3d6fa8;color:#fff}.content{min-width:0}.panel{border:1px solid rgba(148,163,184,.18);border-radius:18px;background:linear-gradient(180deg,rgba(18,26,39,.97),rgba(12,18,28,.98));box-shadow:0 20px 70px rgba(0,0,0,.22);padding:14px;min-height:680px}.panel-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}.panel-head h2{font-size:20px;margin:0}.upload{display:flex;gap:9px;align-items:center;flex-wrap:wrap;border:1px solid #26374f;border-radius:16px;background:rgba(15,23,36,.72);padding:12px;margin-bottom:12px}.muted{color:var(--muted)}input[type=file]{display:none}.msg{min-height:24px;color:var(--gold);margin:8px 0}.ok{color:#9ef0b8}.err{color:#ffb4ac}.layout{display:grid;grid-template-columns:320px 1fr;gap:14px}.side-card,.main-card{border:1px solid #26374f;border-radius:16px;background:#0e1624;padding:12px;min-width:0}.side-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}.side-head h3,.main-card h3{font-size:18px;margin:0}.badge{display:inline-flex;align-items:center;border:1px solid var(--line2);border-radius:999px;padding:3px 9px;background:var(--chip);font-size:12px}.board-list{display:grid;gap:8px;max-height:560px;overflow:auto;padding-right:2px}.board-row{display:grid;grid-template-columns:1fr auto auto;gap:6px;align-items:stretch}.board-btn{min-width:0;text-align:left;border:1px solid transparent;border-radius:14px;background:#121d2d;padding:12px;display:grid;gap:5px}.board-btn:hover{border-color:#2b4162}.board-btn.active{background:linear-gradient(135deg,rgba(47,129,247,.22),rgba(231,196,119,.08));border-color:#3d6fa8}.board-name{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.board-meta{color:var(--muted);font-size:12px}.mini-btn{align-self:stretch;min-width:54px;border-radius:14px;padding:0 10px;font-size:13px;font-weight:700}.empty{border:1px dashed #364760;border-radius:14px;padding:28px 14px;text-align:center;color:var(--muted)}.actions{display:flex;gap:8px;flex-wrap:wrap}.action-btn{border:1px solid var(--line);border-radius:10px;padding:9px 13px;color:#fff;background:#1a2534;cursor:pointer;font-weight:700;letter-spacing:.4px}.action-btn:disabled{opacity:.45;cursor:not-allowed}.action-btn.primary{border:0;background:linear-gradient(135deg,var(--blue),#1f6feb)}.result-layout{display:grid;grid-template-columns:148px 1fr;gap:14px;margin-top:6px}.param-tabs{display:grid;gap:8px;align-content:start}.subtab{width:100%;min-width:0;text-align:left;padding:11px 12px;border-radius:11px;background:transparent;color:var(--muted);font-weight:800}.subtab.active{border-color:#3d6fa8;background:linear-gradient(135deg,rgba(47,129,247,.32),rgba(231,196,119,.10));color:#fff}.subtab .num{margin-left:6px;color:var(--gold)}.result-body{min-width:0}.table{overflow:auto;border:1px solid #26374f;border-radius:14px}table{width:100%;border-collapse:collapse;min-width:520px}th,td{padding:12px 14px;border-bottom:1px solid #26374f;text-align:left;white-space:nowrap}th{position:sticky;top:0;background:#121d2d;color:var(--gold);z-index:1}td.name{font-weight:800;color:#fff}.value{font-variant-numeric:tabular-nums;color:#dbeafe}@media(max-width:900px){.shell{grid-template-columns:1fr}.nav{min-height:0;display:flex;gap:8px}.nav-title{display:none}.nav-btn{margin:0}.layout,.result-layout{grid-template-columns:1fr}.board-list{max-height:300px}}@media(max-width:560px){.panel-head{display:grid}.board-row{grid-template-columns:1fr}.mini-btn{height:38px}.actions button{width:100%}}
</style>
</head>
<body>
<main class="app">
  <header class="top">
    <div class="brand"><div class="mark"></div><div><h1>UniEdge 驱动器板卡配置平台</h1></div></div>
    <button class="ghost" onclick="logout()">退出登录</button>
  </header>

  <section class="shell">
    <aside class="nav">
      <div class="nav-title">功能导航</div>
      <button id="navBoard" class="nav-btn active" onclick="switchView('board')">板卡管理</button>
      <button id="navParam" class="nav-btn" onclick="switchView('param')">参数配置</button>
    </aside>

    <section class="content">
      <section id="boardView" class="panel">
        <div class="panel-head">
          <div><h2>板卡管理</h2><p>上传 tools 生成的加密 bin，页面将显示 bin 内加密保存的中文板卡名称。</p></div>
          <button id="refreshBtn" onclick="loadFiles()">刷新列表</button>
        </div>

        <div class="upload">
          <label class="file-label" for="file">选择 bin 文件</label>
          <input id="file" type="file" accept=".bin,application/octet-stream">
          <span id="fileName" class="muted">未选择文件</span>
          <button id="uploadBtn" class="primary" onclick="upload()">上传板卡配置</button>
        </div>
        <div id="msg" class="msg"></div>

        <div class="side-head"><h3>板卡列表</h3><span id="boardCount" class="badge">0</span></div>
        <div id="boardList" class="board-list"></div>
        <div id="boardEmpty" class="empty hidden">暂无板卡配置，请先上传新版加密 bin。</div>
      </section>

      <section id="paramView" class="panel hidden">
        <div class="panel-head">
          <div><h2 id="title">请选择一个板卡</h2><p id="hint">左侧选择板卡后，ESP32-S3 会在后端解密并返回可见参数。</p></div>
          <div class="actions">
            <button class="action-btn" id="btnConnect" onclick="actConnect()">板卡连接</button>
            <button class="action-btn" id="btnDefault" onclick="actDefault()" disabled>默认参数</button>
            <button class="action-btn" id="btnReadback" onclick="actReadback()" disabled>参数回读</button>
            <button class="action-btn" id="btnDownload" onclick="actDownload()" disabled>参数下载</button>
          </div>
        </div>

        <section class="layout">
          <aside class="side-card">
            <div class="side-head"><h3>板卡列表</h3><span id="paramBoardCount" class="badge">0</span></div>
            <div id="paramBoardList" class="board-list"></div>
            <div id="paramBoardEmpty" class="empty hidden">暂无可配置板卡</div>
          </aside>

          <section class="main-card">
            <div id="idle" class="empty">选择左侧板卡后显示参数配置。</div>
            <div id="parseErr" class="empty err hidden"></div>
            <div id="result" class="hidden">
              <div class="result-layout">
                <nav class="param-tabs">
                  <button id="tabControl" class="subtab active" onclick="switchParamType('control')">控制参数<span id="controlCount" class="num">0</span></button>
                  <button id="tabProtection" class="subtab" onclick="switchParamType('protection')">保护参数<span id="protectionCount" class="num">0</span></button>
                </nav>
                <div class="result-body">
                  <div id="paramEmpty" class="empty hidden">当前分类暂无可见参数</div>
                  <div id="paramTable" class="table"><table><thead><tr><th>参数名称</th><th>默认值</th></tr></thead><tbody id="paramRows"></tbody></table></div>
                </div>
              </div>
            </div>
          </section>
        </section>
      </section>
    </section>
  </section>
</main>
<script>
const $=id=>document.getElementById(id);
let currentView='board',allFiles=[],boards=[],selected=null,uploading=false,parsedParams=[],currentParamType='control';
$('file').addEventListener('change',()=>{$('fileName').textContent=$('file').files[0]?'已选择：'+$('file').files[0].name:'未选择文件';});
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function setMsg(s,ok=false){$('msg').className='msg '+(ok?'ok':'');$('msg').textContent=s||''}
async function readErr(r){try{const j=await r.clone().json();return j.error||r.statusText}catch(e){return await r.text()||r.statusText}}
function xhrErrorText(x){try{const j=JSON.parse(x.responseText||'{}');return j.error||x.statusText}catch(e){return x.responseText||x.statusText||'连接失败'}}
function setBusy(b){uploading=b;$('uploadBtn').disabled=b;$('refreshBtn').disabled=b}
async function checkAuth(){try{const r=await fetch('/api/auth/status');if(!r.ok){location.href='/';return;}await loadFiles();}catch(e){location.href='/'}}
function isBin(f){return !f.is_dir&&(f.is_param_bin||/\.bin$/i.test(f.name||''));}
function boardLabel(f){return f.boardName||f.displayName||f.name||'未命名板卡'}
function normParamType(p){return String(p.paramType||'').toLowerCase();}
function switchView(view){
  currentView=view;
  $('navBoard').classList.toggle('active',view==='board');
  $('navParam').classList.toggle('active',view==='param');
  $('boardView').classList.toggle('hidden',view!=='board');
  $('paramView').classList.toggle('hidden',view!=='param');
  if(view==='param'){
    if(!selected&&boards.length>0){selected=boards[0];}
    renderBoards();
    if(selected){parseSelected();}
  }
}
function renderBoardButtons(targetId, withManageActions){
  $(targetId).innerHTML=boards.map(f=>{
    const active=selected&&selected.path===f.path;
    const label=boardLabel(f);
    return '<div class="board-row">'
      +'<button class="board-btn '+(active?'active':'')+'" data-path="'+esc(f.path)+'"><span class="board-name">'+esc(label)+'</span><span class="board-meta">加密板卡配置</span></button>'
      +(withManageActions?'<a class="file-label mini-btn" href="/download?path='+encodeURIComponent(f.path)+'">下载</a><button class="mini-btn danger" data-del="'+esc(f.path)+'">删除</button>':'')
      +'</div>';
  }).join('');
  document.querySelectorAll('#'+targetId+' .board-btn').forEach(b=>b.onclick=()=>selectBoard(b.dataset.path));
  if(withManageActions){document.querySelectorAll('#'+targetId+' [data-del]').forEach(b=>b.onclick=e=>{e.stopPropagation();deleteBoardByPath(b.dataset.del);});}
}
function renderBoards(){
  boards=allFiles.filter(isBin).sort((a,b)=>boardLabel(a).localeCompare(boardLabel(b),'zh-CN'));
  $('boardCount').textContent=boards.length;
  $('paramBoardCount').textContent=boards.length;
  $('boardEmpty').classList.toggle('hidden',boards.length>0);
  $('paramBoardEmpty').classList.toggle('hidden',boards.length>0);
  renderBoardButtons('boardList',true);
  renderBoardButtons('paramBoardList',false);
}
function selectBoard(path){
  selected=boards.find(f=>f.path===path)||null;
  renderBoards();
  if(!selected)return;
  if(currentView==='param')parseSelected();
  else setMsg('已选择板卡：'+boardLabel(selected),true);
}
async function loadFiles(){
  if(uploading){setMsg('文件正在上传，请稍后刷新');return;}
  setMsg('正在加载板卡列表...');
  try{
    const r=await fetch('/files');
    const j=await r.json();
    if(r.status===401){location.href='/';return;}
    if(!r.ok)throw new Error(j.error||r.statusText);
    allFiles=(j.files||[]).filter(f=>f.name!=='System Volume Information');
    if(selected){const still=allFiles.find(f=>f.path===selected.path);selected=still&&isBin(still)?still:null;}
    renderBoards();
    setMsg('板卡列表已更新，共 '+boards.length+' 个板卡配置',true);
    if(!selected&&boards.length>0){selected=boards[0];renderBoards();}
    if(currentView==='param'&&selected)parseSelected();
  }catch(e){setMsg('加载失败：'+e.message)}
}
function upload(){
  if(uploading){setMsg('文件正在上传，请稍候');return;}
  const f=$('file').files[0];
  if(!f){setMsg('请先选择一个 bin 文件');return;}
  if(!/\.bin$/i.test(f.name)){setMsg('请上传 .bin 文件');return;}
  setBusy(true);setMsg('准备上传...');
  const x=new XMLHttpRequest();
  x.open('POST','/upload?filename='+encodeURIComponent(f.name),true);
  x.upload.onprogress=e=>{setMsg(e.lengthComputable?'正在上传 '+Math.floor(e.loaded*100/e.total)+'%':'正在上传文件...')};
  x.onload=()=>{setBusy(false);if(x.status===401){location.href='/';return;}if(x.status<200||x.status>=300){setMsg('上传失败：'+xhrErrorText(x));return;}setMsg('上传完成，正在刷新板卡名称...',true);$('file').value='';$('fileName').textContent='未选择文件';loadFiles()};
  x.onerror=()=>{setBusy(false);setMsg('上传失败：连接中断')};
  x.ontimeout=()=>{setBusy(false);setMsg('上传失败：连接超时')};
  x.timeout=0;x.send(f);
}
function switchParamType(type){currentParamType=type;renderParamTable();}
function renderParamTable(){
  const control=parsedParams.filter(p=>normParamType(p)==='control');
  const protection=parsedParams.filter(p=>normParamType(p)==='protection');
  $('controlCount').textContent=control.length;
  $('protectionCount').textContent=protection.length;
  $('tabControl').classList.toggle('active',currentParamType==='control');
  $('tabProtection').classList.toggle('active',currentParamType==='protection');
  const list=(currentParamType==='control'?control:protection).slice();
  $('paramRows').innerHTML=list.map(p=>'<tr><td class="name">'+esc(p.name)+'</td><td class="value">'+esc(p.defaultValue)+'</td></tr>').join('');
  $('paramEmpty').classList.toggle('hidden',list.length>0);
  $('paramTable').classList.toggle('hidden',list.length===0);
}
async function parseSelected(){
  if(!selected)return;
  $('idle').classList.add('hidden');$('parseErr').classList.add('hidden');$('result').classList.add('hidden');
  parsedParams=[];
  const label=boardLabel(selected);
  $('title').textContent=label;
  $('hint').textContent='ESP32 正在解密并解析...';
  $('btnDefault').disabled=false;$('btnReadback').disabled=false;$('btnDownload').disabled=false;
  try{
    const r=await fetch('/api/bin/parse?path='+encodeURIComponent(selected.path));
    const j=await r.json();
    if(r.status===401){location.href='/';return;}
    if(!r.ok||!j.ok)throw new Error(j.error||r.statusText);
    if(j.boardName){selected.boardName=j.boardName;selected.displayName=j.boardName;$('title').textContent=j.boardName;renderBoards();}
    parsedParams=(j.parameters||[]).slice();
    currentParamType='control';
    renderParamTable();
    $('result').classList.remove('hidden');
    $('hint').textContent='';
  }catch(e){$('parseErr').textContent='解析失败：'+e.message;$('parseErr').classList.remove('hidden');$('hint').textContent='解析失败，请确认该文件由新版 tools 生成且密钥一致';}
}
async function deleteBoardByPath(path){
  const f=boards.find(x=>x.path===path);
  if(!f)return;
  if(!confirm('确认删除板卡配置 '+boardLabel(f)+' 吗？'))return;
  setMsg('正在删除板卡配置...');
  const body='path='+encodeURIComponent(path);
  const r=await fetch('/delete',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  if(r.status===401){location.href='/';return;}
  if(!r.ok){setMsg('删除失败：'+await readErr(r));return;}
  if(selected&&selected.path===path){selected=null;parsedParams=[];$('result').classList.add('hidden');$('idle').classList.remove('hidden');$('parseErr').classList.add('hidden');$('title').textContent='请选择一个板卡';}
  setMsg('删除完成',true);loadFiles();
}
async function logout(){try{await fetch('/api/logout',{method:'POST'})}catch(e){}location.href='/'}
async function actConnect(){if(!selected){setMsg('请先选择一个板卡');return;}setMsg('正在连接板卡：'+boardLabel(selected));}
function actDefault(){if(!selected)return;setMsg('已恢复默认参数');}
function actReadback(){if(!selected)return;setMsg('参数回读中...');}
function actDownload(){if(!selected)return;setMsg('参数下载中...');}
checkAuth();
</script>
</body>
</html>
