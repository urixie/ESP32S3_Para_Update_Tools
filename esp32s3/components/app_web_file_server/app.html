<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UniEdge 参数 bin 解析</title>
<style>
:root{color-scheme:dark;--bg:#0b111b;--panel:#121a27;--panel2:#0f1724;--line:#253248;--line2:#31425f;--text:#edf5ff;--muted:#91a2bb;--blue:#2f81f7;--blue2:#58a6ff;--gold:#e7c477;--green:#22c55e;--red:#ff7b72;--chip:#1f2a3b}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% -10%,rgba(47,129,247,.25),transparent 30%),radial-gradient(circle at 92% 0,rgba(231,196,119,.15),transparent 28%),var(--bg);color:var(--text);font-family:Arial,'Microsoft YaHei',sans-serif}button,input,.file-label{font:inherit}button,.file-label{border:1px solid var(--line);border-radius:10px;padding:9px 13px;color:#fff;background:#1a2534;cursor:pointer}.primary{border:0;background:linear-gradient(135deg,var(--blue),#1f6feb);font-weight:800}.danger{border-color:#7d3734;color:#ffd7d3;background:#3a2023}.ghost{background:transparent}.hidden{display:none!important}.app{max-width:1280px;margin:0 auto;padding:18px 14px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.brand{display:flex;align-items:center;gap:12px}.mark{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--gold));box-shadow:0 12px 26px rgba(47,129,247,.26)}h1{font-size:24px;margin:0}.sub,p{margin:4px 0;color:var(--muted)}.toolbar{border:1px solid rgba(148,163,184,.18);border-radius:16px;background:linear-gradient(180deg,rgba(18,26,39,.95),rgba(15,23,36,.95));padding:14px;margin-bottom:14px}.upload{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.muted{color:var(--muted)}input[type=file]{display:none}.msg{min-height:24px;color:var(--gold);margin-top:8px}.layout{display:grid;grid-template-columns:320px 1fr;gap:14px}.side,.main{border:1px solid rgba(148,163,184,.18);border-radius:16px;background:linear-gradient(180deg,rgba(18,26,39,.97),rgba(12,18,28,.98));box-shadow:0 20px 70px rgba(0,0,0,.22)}.side{padding:12px;min-height:620px}.side-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}.side h2,.main h2{font-size:18px;margin:0}.bin-list{display:grid;gap:8px;max-height:560px;overflow:auto;padding-right:2px}.bin{width:100%;text-align:left;border:1px solid transparent;border-radius:14px;background:#0e1624;padding:12px;display:grid;gap:5px}.bin:hover{border-color:#2b4162}.bin.active{background:linear-gradient(135deg,rgba(47,129,247,.22),rgba(231,196,119,.08));border-color:#3d6fa8}.bin-name{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bin-meta{display:flex;justify-content:space-between;color:var(--muted);font-size:12px}.empty{border:1px dashed #364760;border-radius:14px;padding:28px 14px;text-align:center;color:var(--muted)}.main{padding:14px;min-width:0}.head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.actions{display:flex;gap:8px;flex-wrap:wrap}.cards{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px;margin:10px 0 14px}.card{border:1px solid var(--line);border-radius:14px;background:var(--panel2);padding:12px}.card .k{font-size:12px;color:var(--muted)}.card .v{margin-top:6px;font-weight:800;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.table{overflow:auto;border:1px solid #26374f;border-radius:14px}table{width:100%;border-collapse:collapse;min-width:760px}th,td{padding:11px 12px;border-bottom:1px solid #26374f;text-align:left;white-space:nowrap}th{position:sticky;top:0;background:#121d2d;color:var(--gold);z-index:1}td.name{font-weight:800;color:#fff}.badge{display:inline-flex;align-items:center;border:1px solid var(--line2);border-radius:999px;padding:3px 9px;background:var(--chip);font-size:12px}.visible{color:#9ef0b8;border-color:rgba(34,197,94,.45);background:rgba(34,197,94,.08)}.hidden-param{color:#ffd2a6;border-color:rgba(231,196,119,.38);background:rgba(231,196,119,.08)}.footer-list{margin-top:12px;border-top:1px solid var(--line);padding-top:12px}.small-table{max-height:170px;overflow:auto;border:1px solid #26374f;border-radius:12px}.small-table table{min-width:600px}.small-table th,.small-table td{padding:8px 10px;font-size:13px}.err{color:#ffb4ac}.ok{color:#9ef0b8}@media(max-width:860px){.layout{grid-template-columns:1fr}.cards{grid-template-columns:repeat(2,1fr)}.top{align-items:flex-start}.side{min-height:0}.bin-list{max-height:280px}}@media(max-width:520px){.cards{grid-template-columns:1fr}.actions button,.actions a{width:100%;text-align:center}.head{display:grid}}
</style>
</head>
<body>
<main class="app">
  <header class="top">
    <div class="brand"><div class="mark"></div><div><h1>UniEdge 参数 bin 解析</h1><p class="sub">ESP32-S3 端解密 AES-256-GCM bin，并显示 72 个参数</p></div></div>
    <button class="ghost" onclick="logout()">退出登录</button>
  </header>

  <section class="toolbar">
    <div class="upload">
      <label class="file-label" for="file">选择 bin 文件</label>
      <input id="file" type="file" accept=".bin,application/octet-stream">
      <span id="fileName" class="muted">未选择文件</span>
      <button id="uploadBtn" class="primary" onclick="upload()">上传文件</button>
      <button id="refreshBtn" onclick="loadFiles()">刷新列表</button>
    </div>
    <div id="msg" class="msg"></div>
  </section>

  <section class="layout">
    <aside class="side">
      <div class="side-head"><h2>bin 文件列表</h2><span id="binCount" class="badge">0</span></div>
      <div id="binList" class="bin-list"></div>
      <div id="binEmpty" class="empty hidden">暂无 .bin 文件，请先上传 tools 生成的加密 bin。</div>
    </aside>

    <section class="main">
      <div class="head">
        <div><h2 id="title">请选择一个 bin 文件</h2><p id="hint">左侧每个 bin 文件对应一个参数解析界面。</p></div>
        <div class="actions"><button id="parseBtn" class="primary hidden" onclick="parseSelected()">重新解析</button><a id="downloadBtn" class="file-label hidden" href="#">下载</a><button id="deleteBtn" class="danger hidden" onclick="deleteSelected()">删除</button></div>
      </div>

      <div id="idle" class="empty">选择左侧 bin 文件后，ESP32-S3 会在后端完成解密和解析，密钥不会暴露到网页 JS。</div>
      <div id="parseErr" class="empty err hidden"></div>
      <div id="result" class="hidden">
        <div class="cards">
          <div class="card"><div class="k">文件大小</div><div id="hFileSize" class="v">-</div></div>
          <div class="card"><div class="k">格式版本</div><div id="hVersion" class="v">-</div></div>
          <div class="card"><div class="k">Header</div><div id="hHeader" class="v">-</div></div>
          <div class="card"><div class="k">密文长度</div><div id="hCipher" class="v">-</div></div>
          <div class="card"><div class="k">Nonce</div><div id="hNonce" class="v">-</div></div>
        </div>
        <div class="table"><table><thead><tr><th>地址</th><th>名称</th><th>默认值</th><th>参数类型</th><th>权限</th></tr></thead><tbody id="paramRows"></tbody></table></div>
      </div>

      <div class="footer-list">
        <p>全部文件</p>
        <div class="small-table"><table><thead><tr><th>文件名</th><th>大小</th><th>类型</th></tr></thead><tbody id="allRows"></tbody></table></div>
      </div>
    </section>
  </section>
</main>
<script>
const $=id=>document.getElementById(id);
let allFiles=[],binFiles=[],selected=null,uploading=false;
$('file').addEventListener('change',()=>{$('fileName').textContent=$('file').files[0]?'已选择：'+$('file').files[0].name:'未选择文件';});
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt(n){n=Number(n)||0;if(n<1024)return n+' B';if(n<1048576)return(n/1024).toFixed(1)+' KB';return(n/1048576).toFixed(2)+' MB'}
function setMsg(s,ok=false){$('msg').className='msg '+(ok?'ok':'');$('msg').textContent=s||''}
async function readErr(r){try{const j=await r.clone().json();return j.error||r.statusText}catch(e){return await r.text()||r.statusText}}
function xhrErrorText(x){try{const j=JSON.parse(x.responseText||'{}');return j.error||x.statusText}catch(e){return x.responseText||x.statusText||'连接失败'}}
function setBusy(b){uploading=b;$('uploadBtn').disabled=b;$('refreshBtn').disabled=b}
async function checkAuth(){try{const r=await fetch('/api/auth/status');if(!r.ok){location.href='/';return;}await loadFiles();}catch(e){location.href='/'}}
function isBin(f){return !f.is_dir&&(f.is_param_bin||/\.bin$/i.test(f.name||''));}
function renderBins(){
  binFiles=allFiles.filter(isBin).sort((a,b)=>String(a.name).localeCompare(String(b.name),'zh-CN'));
  $('binCount').textContent=binFiles.length;
  $('binEmpty').classList.toggle('hidden',binFiles.length>0);
  $('binList').innerHTML=binFiles.map(f=>'<button class="bin '+(selected&&selected.path===f.path?'active':'')+'" data-path="'+esc(f.path)+'"><span class="bin-name">'+esc(f.name)+'</span><span class="bin-meta"><span>'+fmt(f.size)+'</span><span>加密参数 bin</span></span></button>').join('');
  document.querySelectorAll('.bin').forEach(b=>b.onclick=()=>selectBin(b.dataset.path));
}
function renderAll(){
  $('allRows').innerHTML=allFiles.map(f=>'<tr><td>'+esc(f.name)+'</td><td>'+(f.is_dir?'目录':fmt(f.size))+'</td><td>'+esc(f.kind_label||f.firmware_label||'文件')+'</td></tr>').join('');
}
function selectBin(path){
  selected=binFiles.find(f=>f.path===path)||null;
  renderBins();
  if(!selected)return;
  $('title').textContent=selected.name;
  $('hint').textContent='正在解析 '+selected.path;
  $('parseBtn').classList.remove('hidden');$('downloadBtn').classList.remove('hidden');$('deleteBtn').classList.remove('hidden');
  $('downloadBtn').href='/download?path='+encodeURIComponent(selected.path);
  parseSelected();
}
async function loadFiles(){
  if(uploading){setMsg('文件正在上传，请稍后刷新');return;}
  setMsg('正在加载文件列表...');
  try{
    const r=await fetch('/files');
    const j=await r.json();
    if(r.status===401){location.href='/';return;}
    if(!r.ok)throw new Error(j.error||r.statusText);
    allFiles=(j.files||[]).filter(f=>f.name!=='System Volume Information');
    if(selected){const still=allFiles.find(f=>f.path===selected.path);selected=still&&isBin(still)?still:null;}
    renderBins();renderAll();
    setMsg('文件列表已更新，共 '+allFiles.length+' 个项目，其中 bin '+binFiles.length+' 个',true);
    if(!selected&&binFiles.length>0)selectBin(binFiles[0].path);
  }catch(e){setMsg('加载失败：'+e.message)}
}
function upload(){
  if(uploading){setMsg('文件正在上传，请稍候');return;}
  const f=$('file').files[0];
  if(!f){setMsg('请先选择一个文件');return;}
  setBusy(true);setMsg('准备上传...');
  const x=new XMLHttpRequest();
  x.open('POST','/upload?filename='+encodeURIComponent(f.name),true);
  x.upload.onprogress=e=>{setMsg(e.lengthComputable?'正在上传 '+Math.floor(e.loaded*100/e.total)+'%（'+fmt(e.loaded)+' / '+fmt(e.total)+'）':'正在上传文件...')};
  x.onload=()=>{setBusy(false);if(x.status===401){location.href='/';return;}if(x.status<200||x.status>=300){setMsg('上传失败：'+xhrErrorText(x));return;}setMsg('上传完成',true);$('file').value='';$('fileName').textContent='未选择文件';loadFiles()};
  x.onerror=()=>{setBusy(false);setMsg('上传失败：连接中断')};
  x.ontimeout=()=>{setBusy(false);setMsg('上传失败：连接超时')};
  x.timeout=0;x.send(f);
}
async function parseSelected(){
  if(!selected)return;
  $('idle').classList.add('hidden');$('parseErr').classList.add('hidden');$('result').classList.add('hidden');
  $('hint').textContent='ESP32 正在解密并解析...';
  try{
    const r=await fetch('/api/bin/parse?path='+encodeURIComponent(selected.path));
    const j=await r.json();
    if(r.status===401){location.href='/';return;}
    if(!r.ok||!j.ok)throw new Error(j.error||r.statusText);
    const h=j.header||{};
    $('hFileSize').textContent=fmt(h.fileSize);
    $('hVersion').textContent=String(h.formatVersion);
    $('hHeader').textContent=String(h.headerSize)+' B / Tag '+String(h.tagLen)+' B';
    $('hCipher').textContent=fmt(h.ciphertextLen);
    $('hNonce').textContent=h.nonceHex||'-';
    const params=(j.parameters||[]).slice().sort((a,b)=>(a.address||0)-(b.address||0));
    $('paramRows').innerHTML=params.map(p=>'<tr><td>'+p.address+'</td><td class="name">'+esc(p.name)+'</td><td>'+p.defaultValue+'</td><td><span class="badge">'+esc(p.paramTypeLabel||p.paramType)+'</span></td><td><span class="badge '+(p.permission==='visible'?'visible':'hidden-param')+'">'+esc(p.permissionLabel||p.permission)+'</span></td></tr>').join('');
    $('result').classList.remove('hidden');
    $('hint').textContent='解析成功：共 '+params.length+' 个参数';
  }catch(e){$('parseErr').textContent='解析失败：'+e.message;$('parseErr').classList.remove('hidden');$('hint').textContent='解析失败，请确认该文件由 tools 生成且密钥一致';}
}
async function deleteSelected(){
  if(!selected)return;
  if(!confirm('确认删除 '+selected.name+' 吗？'))return;
  setMsg('正在删除文件...');
  const body='path='+encodeURIComponent(selected.path);
  const r=await fetch('/delete',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  if(r.status===401){location.href='/';return;}
  if(!r.ok){setMsg('删除失败：'+await readErr(r));return;}
  selected=null;$('result').classList.add('hidden');$('idle').classList.remove('hidden');$('parseErr').classList.add('hidden');
  setMsg('删除完成',true);loadFiles();
}
async function logout(){try{await fetch('/api/logout',{method:'POST'})}catch(e){}location.href='/'}
checkAuth();
</script>
</body>
</html>
