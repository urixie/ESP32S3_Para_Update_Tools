<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UniEdge 驱动器参数配置平台</title>
<style>
:root{color-scheme:dark;--bg:#0b111b;--panel:#121a27;--panel2:#0f1724;--line:#253248;--line2:#31425f;--text:#edf5ff;--muted:#91a2bb;--blue:#2f81f7;--blue2:#58a6ff;--gold:#e7c477;--green:#22c55e;--red:#ff7b72;--chip:#1f2a3b}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% -10%,rgba(47,129,247,.25),transparent 30%),radial-gradient(circle at 92% 0,rgba(231,196,119,.15),transparent 28%),var(--bg);color:var(--text);font-family:Arial,'Microsoft YaHei',sans-serif}button,input,.file-label{font:inherit}button,.file-label{border:1px solid var(--line);border-radius:10px;padding:9px 13px;color:#fff;background:#1a2534;cursor:pointer}.primary{border:0;background:linear-gradient(135deg,var(--blue),#1f6feb);font-weight:800}.danger{border-color:#7d3734;color:#ffd7d3;background:#3a2023}.ghost{background:transparent}.hidden{display:none!important}.app{max-width:1280px;margin:0 auto;padding:18px 14px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.brand{display:flex;align-items:center;gap:12px}.mark{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--gold));box-shadow:0 12px 26px rgba(47,129,247,.26)}h1{font-size:24px;margin:0}.sub,p{margin:4px 0;color:var(--muted)}.toolbar{border:1px solid rgba(148,163,184,.18);border-radius:16px;background:linear-gradient(180deg,rgba(18,26,39,.95),rgba(15,23,36,.95));padding:14px;margin-bottom:14px}.upload{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.muted{color:var(--muted)}input[type=file]{display:none}.msg{min-height:24px;color:var(--gold);margin-top:8px}.layout{display:grid;grid-template-columns:320px 1fr;gap:14px}.side,.main{border:1px solid rgba(148,163,184,.18);border-radius:16px;background:linear-gradient(180deg,rgba(18,26,39,.97),rgba(12,18,28,.98));box-shadow:0 20px 70px rgba(0,0,0,.22)}.side{padding:12px;min-height:620px}.side-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}.side h2,.main h2{font-size:18px;margin:0}.bin-list{display:grid;gap:8px;max-height:560px;overflow:auto;padding-right:2px}.bin{width:100%;text-align:left;border:1px solid transparent;border-radius:14px;background:#0e1624;padding:12px;display:grid;gap:5px}.bin:hover{border-color:#2b4162}.bin.active{background:linear-gradient(135deg,rgba(47,129,247,.22),rgba(231,196,119,.08));border-color:#3d6fa8}.bin-name{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bin-meta{color:var(--muted);font-size:12px}.bin-row{position:relative;display:grid;grid-template-columns:1fr auto;gap:6px;align-items:stretch}.bin-row .bin{padding-right:64px}.bin-del{align-self:stretch;min-width:54px;border:1px solid #7d3734;color:#ffd7d3;background:#3a2023;border-radius:14px;padding:0 12px;font-size:13px;font-weight:700;cursor:pointer}.bin-del:hover{background:#5a2826;border-color:#a64844}.empty{border:1px dashed #364760;border-radius:14px;padding:28px 14px;text-align:center;color:var(--muted)}.main{padding:14px;min-width:0}.head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.actions{display:flex;gap:8px;flex-wrap:wrap}.action-btn{border:1px solid var(--line);border-radius:10px;padding:9px 13px;color:#fff;background:#1a2534;cursor:pointer;font-weight:700;letter-spacing:.4px}.action-btn:hover:not(:disabled){background:#243247;border-color:#3d6fa8}.action-btn:disabled{opacity:.45;cursor:not-allowed}.action-btn.primary{border:0;background:linear-gradient(135deg,var(--blue),#1f6feb)}.subnav{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0 14px;padding:6px;border:1px solid #26374f;border-radius:14px;background:rgba(15,23,36,.72)}.subtab{min-width:128px;border-radius:11px;background:transparent;color:var(--muted);font-weight:800}.subtab.active{border-color:#3d6fa8;background:linear-gradient(135deg,rgba(47,129,247,.32),rgba(231,196,119,.10));color:#fff}.subtab .num{margin-left:6px;color:var(--gold)}.result-layout{display:grid;grid-template-columns:148px 1fr;gap:14px;margin-top:6px}.param-tabs{display:grid;gap:8px;align-content:start}.param-tabs .subtab{width:100%;min-width:0;text-align:left;padding:11px 12px}.result-body{min-width:0}@media(max-width:640px){.result-layout{grid-template-columns:1fr}}.summary{margin:0 0 10px;color:var(--muted)}.table{overflow:auto;border:1px solid #26374f;border-radius:14px}table{width:100%;border-collapse:collapse;min-width:520px}th,td{padding:12px 14px;border-bottom:1px solid #26374f;text-align:left;white-space:nowrap}th{position:sticky;top:0;background:#121d2d;color:var(--gold);z-index:1}td.name{font-weight:800;color:#fff}.value{font-variant-numeric:tabular-nums;color:#dbeafe}.badge{display:inline-flex;align-items:center;border:1px solid var(--line2);border-radius:999px;padding:3px 9px;background:var(--chip);font-size:12px}.err{color:#ffb4ac}.ok{color:#9ef0b8}@media(max-width:860px){.layout{grid-template-columns:1fr}.top{align-items:flex-start}.side{min-height:0}.bin-list{max-height:280px}}@media(max-width:520px){.actions button,.actions a{width:100%;text-align:center}.head{display:grid}.subtab{flex:1;min-width:0}}
</style>
</head>
<body>
<main class="app">
  <header class="top">
    <div class="brand"><div class="mark"></div><div><h1>UniEdge 驱动器参数配置平台</h1></div></div>
    <button class="ghost" onclick="logout()">退出登录</button>
  </header>

  <section class="toolbar">
    <div class="upload">
      <label class="file-label" for="file">选择 bin 文件</label>
      <input id="file" type="file" accept=".bin,application/octet-stream">
      <span id="fileName" class="muted">未选择文件</span>
      <button id="uploadBtn" class="primary" onclick="upload()">上传文件</button>
      <button id="refreshBtn" onclick="loadFiles()">刷新列表</button>
    </div>
    <div id="msg" class="msg"></div>
  </section>

  <section class="layout">
    <aside class="side">
      <div class="side-head"><h2>bin 文件列表</h2><span id="binCount" class="badge">0</span></div>
      <div id="binList" class="bin-list"></div>
      <div id="binEmpty" class="empty hidden">暂无 bin 文件</div>
    </aside>

    <section class="main">
      <div class="head">
        <div><h2 id="title">请选择一个 bin 文件</h2><p id="hint">左侧每个 bin 文件对应一个参数解析界面。</p></div>
        <div class="actions">
          <button class="action-btn" id="btnConnect" onclick="actConnect()">板卡连接</button>
          <button class="action-btn" id="btnDefault" onclick="actDefault()" disabled>默认参数</button>
          <button class="action-btn" id="btnReadback" onclick="actReadback()" disabled>参数回读</button>
          <button class="action-btn" id="btnDownload" onclick="actDownload()" disabled>参数下载</button>
        </div>
      </div>

      <div id="idle" class="empty"></div>
      <div id="parseErr" class="empty err hidden"></div>
      <div id="result" class="hidden">
        <div class="result-layout">
          <nav class="param-tabs">
            <button id="tabControl" class="subtab active" onclick="switchParamType('control')">控制参数<span id="controlCount" class="num">0</span></button>
            <button id="tabProtection" class="subtab" onclick="switchParamType('protection')">保护参数<span id="protectionCount" class="num">0</span></button>
          </nav>
          <div class="result-body">
            <div id="paramEmpty" class="empty hidden">当前分类暂无可见参数</div>
            <div id="paramTable" class="table"><table><thead><tr><th>参数名称</th><th>默认值</th></tr></thead><tbody id="paramRows"></tbody></table></div>
          </div>
        </div>
      </div>
    </section>
  </section>
</main>
<script>
const $=id=>document.getElementById(id);
let allFiles=[],binFiles=[],selected=null,uploading=false,parsedParams=[],currentParamType='control';
$('file').addEventListener('change',()=>{$('fileName').textContent=$('file').files[0]?'已选择：'+$('file').files[0].name:'未选择文件';});
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function setMsg(s,ok=false){$('msg').className='msg '+(ok?'ok':'');$('msg').textContent=s||''}
async function readErr(r){try{const j=await r.clone().json();return j.error||r.statusText}catch(e){return await r.text()||r.statusText}}
function xhrErrorText(x){try{const j=JSON.parse(x.responseText||'{}');return j.error||x.statusText}catch(e){return x.responseText||x.statusText||'连接失败'}}
function setBusy(b){uploading=b;$('uploadBtn').disabled=b;$('refreshBtn').disabled=b}
async function checkAuth(){try{const r=await fetch('/api/auth/status');if(!r.ok){location.href='/';return;}await loadFiles();}catch(e){location.href='/'}}
function isBin(f){return !f.is_dir&&(f.is_param_bin||/\.bin$/i.test(f.name||''));}
function normParamType(p){return String(p.paramType||'').toLowerCase();}
function visibleParams(){return parsedParams;}
function renderBins(){
  binFiles=allFiles.filter(isBin).sort((a,b)=>String(a.name).localeCompare(String(b.name),'zh-CN'));
  $('binCount').textContent=binFiles.length;
  $('binEmpty').classList.toggle('hidden',binFiles.length>0);
  $('binList').innerHTML=binFiles.map(f=>'<div class="bin-row '+(selected&&selected.path===f.path?'active':'')+'">'
    +'<button class="bin '+(selected&&selected.path===f.path?'active':'')+'" data-path="'+esc(f.path)+'"><span class="bin-name">'+esc(f.name)+'</span><span class="bin-meta">点击查看参数</span></button>'
    +'<button class="bin-del" data-path="'+esc(f.path)+'" title="删除 '+esc(f.name)+'">删除</button>'
    +'</div>').join('');
  document.querySelectorAll('.bin').forEach(b=>b.onclick=()=>selectBin(b.dataset.path));
  document.querySelectorAll('.bin-del').forEach(b=>b.onclick=e=>{e.stopPropagation();deleteBinByPath(b.dataset.path);});
}
function selectBin(path){
  selected=binFiles.find(f=>f.path===path)||null;
  renderBins();
  if(!selected)return;
  $('title').textContent=selected.name;
  $('hint').textContent='正在解析 '+selected.path;
  $('btnDefault').disabled=false;
  $('btnReadback').disabled=false;
  $('btnDownload').disabled=false;
  parseSelected();
}
async function loadFiles(){
  if(uploading){setMsg('文件正在上传，请稍后刷新');return;}
  setMsg('正在加载文件列表...');
  try{
    const r=await fetch('/files');
    const j=await r.json();
    if(r.status===401){location.href='/';return;}
    if(!r.ok)throw new Error(j.error||r.statusText);
    allFiles=(j.files||[]).filter(f=>f.name!=='System Volume Information');
    if(selected){const still=allFiles.find(f=>f.path===selected.path);selected=still&&isBin(still)?still:null;}
    renderBins();
    setMsg('文件列表已更新，共 '+binFiles.length+' 个 bin',true);
    if(!selected&&binFiles.length>0)selectBin(binFiles[0].path);
  }catch(e){setMsg('加载失败：'+e.message)}
}
function upload(){
  if(uploading){setMsg('文件正在上传，请稍候');return;}
  const f=$('file').files[0];
  if(!f){setMsg('请先选择一个文件');return;}
  setBusy(true);setMsg('准备上传...');
  const x=new XMLHttpRequest();
  x.open('POST','/upload?filename='+encodeURIComponent(f.name),true);
  x.upload.onprogress=e=>{setMsg(e.lengthComputable?'正在上传 '+Math.floor(e.loaded*100/e.total)+'%':'正在上传文件...')};
  x.onload=()=>{setBusy(false);if(x.status===401){location.href='/';return;}if(x.status<200||x.status>=300){setMsg('上传失败：'+xhrErrorText(x));return;}setMsg('上传完成',true);$('file').value='';$('fileName').textContent='未选择文件';loadFiles()};
  x.onerror=()=>{setBusy(false);setMsg('上传失败：连接中断')};
  x.ontimeout=()=>{setBusy(false);setMsg('上传失败：连接超时')};
  x.timeout=0;x.send(f);
}
function switchParamType(type){
  currentParamType=type;
  renderParamTable();
}
function renderParamTable(){
  const visible=visibleParams();
  const control=visible.filter(p=>normParamType(p)==='control');
  const protection=visible.filter(p=>normParamType(p)==='protection');
  $('controlCount').textContent=control.length;
  $('protectionCount').textContent=protection.length;
  $('tabControl').classList.toggle('active',currentParamType==='control');
  $('tabProtection').classList.toggle('active',currentParamType==='protection');
  const list=(currentParamType==='control'?control:protection).slice();
  // 已移除“当前显示 N 个可见参数”的分类提示，仅保留分页按钮
  $('paramRows').innerHTML=list.map(p=>'<tr><td class="name">'+esc(p.name)+'</td><td class="value">'+esc(p.defaultValue)+'</td></tr>').join('');
  $('paramEmpty').classList.toggle('hidden',list.length>0);
  $('paramTable').classList.toggle('hidden',list.length===0);
}
async function parseSelected(){
  if(!selected)return;
  $('idle').classList.add('hidden');$('parseErr').classList.add('hidden');$('result').classList.add('hidden');
  parsedParams=[];
  $('hint').textContent='ESP32 正在解密并解析...';
  try{
    const r=await fetch('/api/bin/parse?path='+encodeURIComponent(selected.path));
    const j=await r.json();
    if(r.status===401){location.href='/';return;}
    if(!r.ok||!j.ok)throw new Error(j.error||r.statusText);
    parsedParams=(j.parameters||[]).slice();
    currentParamType='control';
    renderParamTable();
    $('result').classList.remove('hidden');
    $('hint').textContent='';
  }catch(e){$('parseErr').textContent='解析失败：'+e.message;$('parseErr').classList.remove('hidden');$('hint').textContent='解析失败，请确认该文件由 tools 生成且密钥一致';}
}
async function deleteBinByPath(path){
  const f=binFiles.find(x=>x.path===path);
  if(!f)return;
  if(!confirm('确认删除 '+f.name+' 吗？'))return;
  setMsg('正在删除文件...');
  const body='path='+encodeURIComponent(path);
  const r=await fetch('/delete',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  if(r.status===401){location.href='/';return;}
  if(!r.ok){setMsg('删除失败：'+await readErr(r));return;}
  if(selected&&selected.path===path){
    selected=null;parsedParams=[];$('result').classList.add('hidden');$('idle').classList.remove('hidden');$('parseErr').classList.add('hidden');
  }
  setMsg('删除完成',true);loadFiles();
}
async function logout(){try{await fetch('/api/logout',{method:'POST'})}catch(e){}location.href='/'}
// 预留的 4 个动作按钮——后续接入：板卡握手、恢复默认、从设备回读参数、生成参数 bin 下载
async function actConnect(){
  if(!selected){setMsg('请先选择一个 bin 文件');return;}
  setMsg('正在连接板卡...');
  // TODO: 调用 /api/board/connect 等接口
}
function actDefault(){
  if(!selected)return;
  // TODO: 恢复参数为默认值
  setMsg('已恢复默认参数');
}
function actReadback(){
  if(!selected)return;
  // TODO: 从板卡回读参数覆盖当前解析
  setMsg('参数回读中...');
}
function actDownload(){
  if(!selected)return;
  // TODO: 打包当前参数为 bin 并触发下载
  setMsg('参数下载中...');
}
checkAuth();
</script>
</body>
</html>
