/* ===== Unified parameter workspace: remove duplicated card frames ===== */
#paramPage .board-head-hidden,
#paramPage .head.board-head-hidden {
  display: none !important;
  margin: 0 !important;
  padding: 0 !important;
}

#paramPage .main,
#paramPage .action-pane {
  border: 0;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
}

#paramPage .main {
  padding: 0;
}

#paramPage .action-pane {
  padding: 0;
}

#paramPage .result-layout {
  margin-top: 0;
}

@media (max-width: 900px) {
  #paramPage .main,
  #paramPage .action-pane {
    border: 0;
    border-radius: 0;
    background: transparent;
    box-shadow: none;
    padding: 0;
  }
}



/* ===== File page: fixed list header + body-only vertical scroll ===== */
.root.page-files .file-shell {
  min-height: 0;
  overflow: hidden;
}

.root.page-files .file-list-pane {
  min-height: 0;
  overflow: hidden;
}

.root.page-files .file-list-pane .view-title {
  flex: 0 0 auto;
  margin-bottom: 12px;
}

.root.page-files #fileTable {
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-gutter: stable;
}

.root.page-files #fileTable table {
  width: 100%;
  min-width: 0;
  table-layout: fixed;
}

.root.page-files #fileTable th {
  position: sticky;
  top: 0;
  z-index: 4;
  background: #121d2d;
}

.root.page-files #fileTable th:nth-child(1),
.root.page-files #fileTable td:nth-child(1) {
  width: auto;
}

.root.page-files #fileTable th:nth-child(2),
.root.page-files #fileTable td:nth-child(2) {
  width: 150px;
}

.root.page-files #fileTable td.name {
  overflow: hidden;
  text-overflow: ellipsis;
}

.toast {
  position: fixed;
  left: 50%;
  top: 22px;
  z-index: 9999;
  transform: translate(-50%, -12px);
  min-width: 180px;
  max-width: min(420px, calc(100vw - 32px));
  padding: 11px 16px;
  border: 1px solid rgba(158, 240, 184, .46);
  border-radius: 10px;
  background: rgba(15, 23, 36, .96);
  color: #d7ffe3;
  box-shadow: 0 18px 48px rgba(0, 0, 0, .34);
  font-weight: 800;
  text-align: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .16s ease, transform .16s ease;
}

.toast.show {
  opacity: 1;
  transform: translate(-50%, 0);
}

/* ===== State Grid industrial power-console theme ===== */
body {
  background:
    linear-gradient(rgba(33, 212, 253, .035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 200, 83, .035) 1px, transparent 1px),
    radial-gradient(circle at 16% -10%, rgba(0, 166, 80, .18), transparent 34%),
    radial-gradient(circle at 88% 4%, rgba(33, 212, 253, .12), transparent 30%),
    linear-gradient(180deg, #06110E 0%, #071713 48%, #050D0B 100%);
  background-size: 34px 34px, 34px 34px, auto, auto, auto;
}

button,
.file-label {
  border-color: var(--line);
  background: linear-gradient(180deg, #132C25, #0B1C17);
  color: var(--text);
  box-shadow: inset 0 1px 0 rgba(242, 255, 249, .05);
}

button:hover:not(:disabled),
.file-label:hover {
  border-color: rgba(33, 212, 253, .42);
  background: linear-gradient(180deg, #17362E, #0D241E);
}

.primary {
  background: linear-gradient(135deg, #00A650, #008C45);
  color: #F5FFF9;
  box-shadow: 0 0 0 1px rgba(0, 200, 83, .2), 0 12px 28px rgba(0, 80, 38, .28);
}

.left-nav,
.side {
  border-right-color: rgba(43, 90, 78, .72);
  background:
    linear-gradient(180deg, rgba(7, 23, 19, .98), rgba(4, 13, 11, .99)),
    linear-gradient(90deg, rgba(0, 200, 83, .08), transparent 42%);
  box-shadow: 18px 0 48px rgba(0, 0, 0, .28), inset -1px 0 0 rgba(33, 212, 253, .08);
}

.nav-brand {
  border-bottom-color: rgba(43, 90, 78, .78);
}

.logo {
  filter: drop-shadow(0 4px 14px rgba(0, 200, 83, .25));
}

.logo .logo-accent {
  fill: var(--green);
}

.brand-sub {
  color: #CDEDE2;
}

.nav-btn {
  border-radius: 8px;
  color: #A6C7BC;
}

.nav-btn:hover {
  border-color: rgba(33, 212, 253, .35);
  background: rgba(16, 40, 32, .78);
}

.nav-btn.active {
  border-color: rgba(0, 200, 83, .76);
  background: linear-gradient(135deg, rgba(0, 166, 80, .34), rgba(33, 212, 253, .09));
  box-shadow: inset 3px 0 0 var(--green), 0 10px 28px rgba(0, 60, 34, .22);
  color: var(--text);
}

.nav-icon {
  border: 1px solid rgba(43, 90, 78, .76);
  background: linear-gradient(180deg, #102820, #0A1D18);
  color: var(--cyan);
  box-shadow: inset 0 0 12px rgba(33, 212, 253, .08);
}

.panel,
.toolbar,
.main,
.action-pane {
  border-color: rgba(43, 90, 78, .68);
  background: linear-gradient(180deg, rgba(13, 31, 26, .97), rgba(7, 19, 16, .98));
  box-shadow: 0 18px 54px rgba(0, 0, 0, .28), inset 0 1px 0 rgba(242, 255, 249, .04);
}

#paramPage .action-pane {
  border-left: 1px solid rgba(43, 90, 78, .7);
  background: linear-gradient(180deg, rgba(13, 31, 26, .4), rgba(6, 17, 14, .1));
}

.table,
.param-table .table-inner,
.root.page-files #fileTable {
  border-color: rgba(43, 90, 78, .82);
  background: rgba(6, 17, 14, .72);
}

th,
.param-table th,
.root.page-files #fileTable th {
  background: linear-gradient(180deg, #102820, #0B1E18);
  color: var(--gold);
  border-bottom-color: rgba(245, 179, 1, .22);
}

td {
  border-bottom-color: rgba(30, 58, 52, .76);
}

td.name,
.value {
  color: #E8FFF6;
}

.badge {
  border-color: rgba(0, 200, 83, .42);
  background: linear-gradient(180deg, #102820, #0A1E19);
  color: #CFFFEA;
  box-shadow: inset 0 0 0 1px rgba(33, 212, 253, .05);
}

.empty {
  border-color: rgba(43, 90, 78, .78);
  background: rgba(6, 17, 14, .42);
  color: var(--muted);
}

.bin {
  border-radius: 8px;
  background: linear-gradient(180deg, #102820, #091B16);
  border-color: rgba(30, 58, 52, .62);
}

.bin:hover {
  border-color: rgba(33, 212, 253, .38);
  background: linear-gradient(180deg, #14362D, #0B241D);
}

.bin.active {
  border-color: rgba(0, 200, 83, .82);
  background: linear-gradient(135deg, rgba(0, 166, 80, .32), rgba(16, 40, 32, .96));
  box-shadow: inset 4px 0 0 var(--green), inset 0 0 0 1px rgba(0, 200, 83, .18), 0 12px 28px rgba(0, 50, 28, .28);
}

.bin-count,
.subtab .num,
.msg {
  color: var(--gold);
}

.subtab {
  border-radius: 8px;
  border-color: rgba(30, 58, 52, .78);
  background: rgba(8, 24, 20, .34);
}

.subtab:hover {
  border-color: rgba(33, 212, 253, .35);
  color: #DDFBF2;
}

.subtab.active {
  border-color: rgba(0, 200, 83, .82);
  background: linear-gradient(135deg, rgba(0, 166, 80, .32), rgba(33, 212, 253, .08));
  box-shadow: inset 3px 0 0 var(--green), 0 10px 24px rgba(0, 55, 30, .22);
  color: var(--text);
}

.param-value-input {
  width: 124px;
  max-width: 100%;
  height: 34px;
  padding: 6px 10px;
  border: 1px solid rgba(43, 90, 78, .9);
  border-radius: 6px;
  outline: none;
  background: linear-gradient(180deg, #071713, #06110E);
  color: #EFFFF8;
  box-shadow: inset 0 1px 0 rgba(242, 255, 249, .05), inset 0 0 0 1px rgba(0, 200, 83, .04);
  font-weight: 800;
}

.param-value-input:hover {
  border-color: rgba(33, 212, 253, .56);
}

.param-value-input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 2px rgba(0, 200, 83, .18), 0 0 20px rgba(33, 212, 253, .08), inset 0 0 0 1px rgba(0, 200, 83, .12);
}

.action-btn {
  border-radius: 8px;
  border-color: rgba(43, 90, 78, .86);
  background: linear-gradient(180deg, #143029, #0A1D18);
  color: #EAFEF6;
  box-shadow: inset 0 1px 0 rgba(242, 255, 249, .05);
}

.action-btn:hover:not(:disabled) {
  border-color: rgba(33, 212, 253, .55);
  background: linear-gradient(180deg, #173A31, #0C261F);
}

#btnDefault {
  background: linear-gradient(180deg, #132C25, #091A16);
}

#btnReadback {
  border-color: rgba(33, 212, 253, .78);
  color: #DDF9FF;
  background: linear-gradient(180deg, rgba(33, 212, 253, .10), rgba(7, 23, 19, .88));
}

#btnReadback:hover:not(:disabled) {
  border-color: var(--cyan);
  box-shadow: 0 0 0 1px rgba(33, 212, 253, .14), 0 12px 28px rgba(33, 212, 253, .08);
}

#btnDownload {
  border-color: rgba(0, 200, 83, .95);
  background: linear-gradient(180deg, #00C853, #008D46);
  color: #F6FFF9;
  box-shadow: 0 0 0 1px rgba(0, 200, 83, .28), 0 16px 32px rgba(0, 85, 42, .34);
}

#btnDownload:hover:not(:disabled) {
  background: linear-gradient(180deg, #16D966, #00A650);
  border-color: #48F28B;
}

.action-btn:disabled,
#btnDownload:disabled,
#btnReadback:disabled {
  opacity: .42;
  box-shadow: none;
}

.toast {
  border-color: rgba(0, 200, 83, .48);
  background: linear-gradient(180deg, rgba(13, 31, 26, .98), rgba(6, 17, 14, .98));
  color: #DFFFF0;
}

.nav-foot {
  display: grid;
  gap: 8px;
}

.nav-foot button {
  width: 100%;
}

.about-btn {
  border-color: rgba(33, 212, 253, .52);
  color: #DDF9FF;
  background: linear-gradient(180deg, rgba(33, 212, 253, .1), rgba(7, 23, 19, .92));
}

.about-backdrop {

<script>
const $=id=>document.getElementById(id);
const paramCounts={}; // path -> 已解析得到的参数数量
const boardParamStates={}; // path -> { parameters: [], currentParamType: 'control', parsed: false }
let allFiles=[],binFiles=[],selected=null,uploading=false,paramBusy=false,parsedParams=[],currentParamType='control',currentPage='files';
let toastTimer=null;
$('file').addEventListener('change',()=>{$('fileName').textContent=$('file').files[0]?'已选择：'+$('file').files[0].name:'未选择文件';});
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function setMsg(s,ok=false){$('msg').className='msg '+(ok?'ok':'');$('msg').textContent=s||''}
function showToast(s,duration=1000){
  const toast=$('toast');
  if(!toast)return;
  if(toastTimer)clearTimeout(toastTimer);
  toast.textContent=s;
  toast.classList.add('show');
  toastTimer=setTimeout(()=>{toast.classList.remove('show');},duration);
}
async function readErr(r){try{const j=await r.clone().json();return j.error||r.statusText}catch(e){return await r.text()||r.statusText}}
function xhrErrorText(x){try{const j=JSON.parse(x.responseText||'{}');return j.error||x.statusText}catch(e){return x.responseText||x.statusText||'连接失败'}}
function setBusy(b){uploading=b;$('uploadBtn').disabled=b;$('refreshBtn').disabled=b}
function setParamBusy(b){
  paramBusy=b;
  const disabled=b||!selected;
  $('btnDefault').disabled=disabled;
  $('btnReadback').disabled=disabled;
  $('btnDownload').disabled=disabled;
}
async function postForm(url,fields){
  const body=new URLSearchParams(fields);
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  let j=null;
  try{j=await r.json();}catch(e){j={ok:false,error:r.statusText};}
  if(r.status===401){location.href='/';return null;}
  if(!r.ok||!j.ok)throw new Error((j&&j.error)||r.statusText);
  return j;
}
async function checkAuth(){try{const r=await fetch('/api/auth/status');if(!r.ok){location.href='/';return;}await loadFiles();}catch(e){location.href='/'}}
function isBin(f){return !f.is_dir&&(f.is_param_bin||/\.bin$/i.test(f.name||''));}
function boardLabel(f){return f.boardName||f.displayName||'未识别板卡配置'}
function normParamType(p){return String(p.paramType||'').toLowerCase();}
function currentBoardKey(){
  return selected&&selected.path?selected.path:null;
}
function getCurrentBoardState(){
  const key=currentBoardKey();
  if(!key)return null;
  if(!boardParamStates[key]){
    boardParamStates[key]={parameters:[],currentParamType:'control',parsed:false};
  }
  return boardParamStates[key];
}
function getCurrentParams(){
  const state=getCurrentBoardState();
  return state?state.parameters:[];
}
function switchPage(page){
  currentPage=page;
  $('filePage').classList.toggle('hidden',page!=='files');
  $('paramPage').classList.toggle('hidden',page!=='params');
  $('navFiles').classList.toggle('active',page==='files');
  $('navParams').classList.toggle('active',page==='params');
  document.querySelector('.root').classList.toggle('page-files',page==='files');
  if(page==='params'){
    if(!selected&&binFiles.length>0){
      selectBin(binFiles[0].path,true);
    }else{
      renderBins();
      if(selected){
        const state=getCurrentBoardState();
        if(state&&state.parsed){
          currentParamType=state.currentParamType||'control';
          renderParamTable();
          $('result').classList.remove('hidden');
          $('parseErr').classList.add('hidden');
          $('hint').textContent='';
        }else{
          parseSelected();
        }
      }
    }
  }
}
function renderFiles(){
  $('fileCount').textContent=binFiles.length;
  $('fileTable').classList.toggle('hidden',binFiles.length===0);
  $('fileRows').innerHTML=binFiles.map(f=>{
    const label=boardLabel(f);
    return '<tr><td class="name">'+esc(label)+'</td><td><div class="file-actions"><button class="danger file-del" data-path="'+esc(f.path)+'">删除</button></div></td></tr>';
  }).join('');
  document.querySelectorAll('.file-del').forEach(b=>b.onclick=()=>deleteFileByPath(b.dataset.path));
}
function renderBins(){
  binFiles=allFiles.filter(isBin).sort((a,b)=>boardLabel(a).localeCompare(boardLabel(b),'zh-CN'));
  $('binCount').textContent=binFiles.length;
  $('binEmpty').classList.toggle('hidden',binFiles.length>0);
  $('binList').innerHTML=binFiles.map(f=>{
    const isActive=!!(selected&&selected.path===f.path);
    const count=paramCounts[f.path];
    const countText=count!=null?'共 '+count+' 项参数':'尚未解析';
    return '<div class="bin-row">'
      +'<button class="bin'+(isActive?' active':'')+'" data-path="'+esc(f.path)+'" title="'+esc(boardLabel(f))+'">'
      +'<span class="bin-name">'+esc(boardLabel(f))+'</span>'
      +'<span class="bin-count">'+esc(countText)+'</span>'
      +'<span class="bin-hint">点击查看参数</span>'
      +'</button></div>';
  }).join('');
  document.querySelectorAll('.bin').forEach(b=>b.onclick=()=>selectBin(b.dataset.path,true));
}
function selectBin(path,parseNow=true){
  selected=binFiles.find(f=>f.path===path)||null;
  renderBins();
  if(!selected)return;
  $('title').textContent=boardLabel(selected);
  $('hint').textContent='正在解析板卡配置...';
  if(!paramBusy)setParamBusy(false);
  const state=getCurrentBoardState();
  if(state&&state.parsed){
    currentParamType=state.currentParamType||'control';
    renderParamTable();
    $('result').classList.remove('hidden');
    $('parseErr').classList.add('hidden');
    $('hint').textContent='';
    return;
  }
  if(parseNow)parseSelected();
}
async function loadFiles(){
  if(uploading){setMsg('文件正在上传，请稍后刷新');return;}
  setMsg('正在加载板卡列表...');
  try{
    const r=await fetch('/files');
    const j=await r.json();
    if(r.status===401){location.href='/';return;}
    if(!r.ok)throw new Error(j.error||r.statusText);
    allFiles=(j.files||[]).filter(f=>f.name!=='System Volume Information');
    binFiles=allFiles.filter(isBin).sort((a,b)=>boardLabel(a).localeCompare(boardLabel(b),'zh-CN'));
    if(selected){const still=binFiles.find(f=>f.path===selected.path);selected=still||null;}
    renderFiles();renderBins();
    setMsg('板卡列表已更新，共 '+binFiles.length+' 个板卡配置',true);
    if(currentPage==='params'&&!selected&&binFiles.length>0)selectBin(binFiles[0].path,true);
  }catch(e){setMsg('加载失败：'+e.message)}
}
function upload(){
  if(uploading){setMsg('文件正在上传，请稍候');return;}
  const f=$('file').files[0];
  if(!f){setMsg('请先选择一个板卡配置文件');return;}
  if(!/\.bin$/i.test(f.name)){setMsg('请上传 .bin 板卡配置文件');return;}
  setBusy(true);setMsg('准备上传...');
  const x=new XMLHttpRequest();
  x.open('POST','/upload?filename='+encodeURIComponent(f.name),true);
  x.upload.onprogress=e=>{setMsg(e.lengthComputable?'正在上传 '+Math.floor(e.loaded*100/e.total)+'%':'正在上传文件...')};
  x.onload=()=>{setBusy(false);if(x.status===401){location.href='/';return;}if(x.status<200||x.status>=300){setMsg('上传失败：'+xhrErrorText(x));return;}setMsg('上传完成，正在刷新板卡名称...',true);$('file').value='';$('fileName').textContent='未选择文件';loadFiles()};
  x.onerror=()=>{setBusy(false);setMsg('上传失败：连接中断')};
  x.ontimeout=()=>{setBusy(false);setMsg('上传失败：连接超时')};
  x.timeout=0;x.send(f);
}
function switchParamType(type){
  const state=getCurrentBoardState();
  if(state)state.currentParamType=type;
  currentParamType=type;
  renderParamTable();
}
function renderParamTable(){
  const state=getCurrentBoardState();
  const params=getCurrentParams();
  const activeType=(state&&state.currentParamType)||currentParamType||'control';
  currentParamType=activeType;
  parsedParams=params;
  const control=params.filter(p=>normParamType(p)==='control');
  const protection=params.filter(p=>normParamType(p)==='protection');
  $('controlCount').textContent=control.length;
  $('protectionCount').textContent=protection.length;
  $('tabControl').classList.toggle('active',activeType==='control');
  $('tabProtection').classList.toggle('active',activeType==='protection');

  const list=params
    .map((p,i)=>({p,i}))
    .filter(x=>normParamType(x.p)===activeType);

  $('paramRows').innerHTML=list.map(x=>{
    const v=x.p.currentValue==null?'':x.p.currentValue;
    return '<tr>'
      +'<td class="name">'+esc(x.p.name)+'</td>'
      +'<td class="value"><input class="param-value-input" type="number" min="0" max="65535" step="1" inputmode="numeric" data-index="'+x.i+'" value="'+esc(v)+'"></td>'
      +'<td class="value">ns</td>'
      +'</tr>';
  }).join('');

  document.querySelectorAll('.param-value-input').forEach(input=>{
    input.oninput=()=>{
      const idx=Number(input.dataset.index);
      if(!params[idx])return;

      if(input.value===''){
        delete params[idx].currentValue;
        return;
      }

      let v=Number(input.value);
      if(!Number.isFinite(v)){
        delete params[idx].currentValue;
        input.value='';
        return;
      }

      if(v<0)v=0;
      if(v>65535)v=65535;
      v=Math.floor(v);

      params[idx].currentValue=v;
      input.value=String(v);
    };
  });

  $('paramEmpty').classList.toggle('hidden',list.length>0);
  $('paramTable').classList.toggle('hidden',list.length===0);
}
async function parseSelected(){
  if(!selected)return;
  const path=selected.path;
  $('parseErr').classList.add('hidden');$('result').classList.add('hidden');
  $('title').textContent=boardLabel(selected);
  $('hint').textContent='ESP32 正在解密并解析...';
  if(!paramBusy)setParamBusy(false);
  try{
    const r=await fetch('/api/bin/parse?path='+encodeURIComponent(path));
    const j=await r.json();
    if(r.status===401){location.href='/';return;}
    if(!r.ok||!j.ok)throw new Error(j.error||r.statusText);
    const file=binFiles.find(f=>f.path===path)||allFiles.find(f=>f.path===path);
    if(j.boardName&&file){file.boardName=j.boardName;file.displayName=j.boardName;}
    const state=boardParamStates[path]||{parameters:[],currentParamType:'control',parsed:false};
    const oldParams=state.parameters||[];
    const newParams=(j.parameters||[]).map((p,i)=>{
      const oldByAddr=oldParams.find(o=>o&&o.address!=null&&p.address!=null&&Number(o.address)===Number(p.address));
      const oldByKey=oldParams.find(o=>o&&o.name===p.name&&normParamType(o)===normParamType(p));
      const old=oldByAddr||oldByKey||oldParams[i];
      return old&&old.currentValue!=null?{...p,currentValue:old.currentValue}:{...p};
    });
    state.parameters=newParams;
    state.currentParamType='control';
    state.parsed=true;
    boardParamStates[path]=state;
    paramCounts[path]=(typeof j.visibleCount==='number')?j.visibleCount:newParams.length;
    if(selected&&selected.path===path&&j.boardName){selected.boardName=j.boardName;selected.displayName=j.boardName;$('title').textContent=j.boardName;}
    renderFiles();
    renderBins();
    if(selected&&selected.path===path){
      currentParamType=state.currentParamType;
      renderParamTable();
      $('result').classList.remove('hidden');
      $('parseErr').classList.add('hidden');
      $('hint').textContent='';
    }
  }catch(e){
    if(selected&&selected.path===path){
      $('parseErr').textContent='解析失败：'+e.message;
      $('parseErr').classList.remove('hidden');
      $('hint').textContent='解析失败，请确认该文件由新版 tools 生成且密钥一致';
    }
  }
}
async function deleteFileByPath(path){
  const f=binFiles.find(x=>x.path===path);
  const label=f?boardLabel(f):'该板卡配置';
  if(!confirm('确认删除板卡配置 '+label+' 吗？'))return;
  setMsg('正在删除板卡配置...');
  const body='path='+encodeURIComponent(path);
  const r=await fetch('/delete',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  if(r.status===401){location.href='/';return;}
  if(!r.ok){setMsg('删除失败：'+await readErr(r));return;}
  delete boardParamStates[path];
  delete paramCounts[path];
  if(selected&&selected.path===path){selected=null;parsedParams=[];$('result').classList.add('hidden');$('parseErr').classList.add('hidden');$('title').textContent='请选择一个板卡';}
  setMsg('删除完成',true);loadFiles();
}
async function logout(){try{await fetch('/api/logout',{method:'POST'})}catch(e){}location.href='/'}
function openAbout(){$('aboutDialog').classList.remove('hidden')}
function closeAbout(){$('aboutDialog').classList.add('hidden')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeAbout();});
function actDefault(){
  const state=getCurrentBoardState();
  if(!selected||!state||state.parameters.length===0)return;
  state.parameters.forEach(p=>{p.currentValue=p.defaultValue;});
  renderParamTable();
  showToast('默认参数填充成功');
}
async function actReadback(){
  const state=getCurrentBoardState();
  if(!selected||!state)return;
  const path=selected.path;
  try{
    setParamBusy(true);
    showToast('正在回读参数...',1200);
    const j=await postForm('/api/param/readback',{path});
    if(!j)return;
    if(!(selected&&selected.path===path))return;
    const valueMap={};
    (j.values||[]).forEach(item=>{valueMap[Number(item.address)]=item.value;});
    state.parameters.forEach(p=>{
      const addr=Number(p.address);
      if(Object.prototype.hasOwnProperty.call(valueMap,addr)){
        p.currentValue=valueMap[addr];
      }
    });
    renderParamTable();
    showToast('参数回读成功');
  }catch(e){
    showToast('参数回读失败：'+e.message,1800);
  }finally{
    setParamBusy(false);
  }
}
async function actDownload(){
  const state=getCurrentBoardState();
  if(!selected||!state)return;
  const path=selected.path;
  const params=state.parameters;
  const pairs=[];
  for(const p of params){
    const addr=Number(p.address);
    if(!Number.isInteger(addr)||addr<0||addr>71){
      showToast('参数地址无效',1800);
      return;
    }
    if(p.currentValue==null||p.currentValue===''){
      showToast('请先填写所有可见参数',1800);
      return;
    }
    let v=Number(p.currentValue);
    if(!Number.isFinite(v)||v<0||v>65535){
      showToast('参数值必须在 0~65535',1800);
      return;
    }
    pairs.push(addr+':'+Math.floor(v));
  }
  try{
    setParamBusy(true);
    showToast('正在下载参数...',1200);
    const j=await postForm('/api/param/download',{path,values:pairs.join(',')});
    if(!j)return;
    showToast('参数下载成功');
  }catch(e){
    showToast('参数下载失败：'+e.message,1800);
  }finally{
    setParamBusy(false);
  }
}
checkAuth();
