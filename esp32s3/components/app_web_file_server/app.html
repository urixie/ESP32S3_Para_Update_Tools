<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UniEdge 驱动器板卡配置平台</title>
<style>
:root{color-scheme:dark;--bg:#0b111b;--nav:#08101c;--panel:#121a27;--panel2:#0f1724;--line:#253248;--line2:#31425f;--text:#edf5ff;--muted:#91a2bb;--blue:#2f81f7;--gold:#e7c477;--green:#22c55e;--red:#ff7b72;--chip:#1f2a3b}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 10% -10%,rgba(47,129,247,.25),transparent 30%),radial-gradient(circle at 92% 0,rgba(231,196,119,.15),transparent 28%),var(--bg);color:var(--text);font-family:Arial,'Microsoft YaHei',sans-serif}button,input,.file-label{font:inherit}button,.file-label{border:1px solid var(--line);border-radius:10px;padding:9px 13px;color:#fff;background:#1a2534;cursor:pointer}.primary{border:0;background:linear-gradient(135deg,var(--blue),#1f6feb);font-weight:800}.danger{border-color:#7d3734;color:#ffd7d3;background:#3a2023}.danger:hover{background:#5a2826;border-color:#a64844}.ghost{background:transparent}.hidden{display:none!important}.root{min-height:100vh;display:grid;grid-template-columns:188px 260px minmax(0,1fr)}.root.page-files{grid-template-columns:188px minmax(0,1fr)}.root.page-files .side{display:none}.left-nav{position:sticky;top:0;height:100vh;padding:16px 12px;border-right:1px solid rgba(148,163,184,.16);background:linear-gradient(180deg,rgba(8,16,28,.98),rgba(5,10,18,.98));box-shadow:16px 0 50px rgba(0,0,0,.22);display:flex;flex-direction:column;gap:14px}.nav-brand{display:flex;align-items:center;gap:10px;padding:4px 4px 12px;border-bottom:1px solid rgba(148,163,184,.14)}.mark{width:38px;height:38px;border-radius:13px;background:linear-gradient(135deg,var(--blue),var(--gold));box-shadow:0 12px 26px rgba(47,129,247,.26)}.brand-title{font-size:15px;font-weight:900;line-height:1.2}.brand-sub{font-size:11px;color:var(--muted);margin-top:3px}.nav-menu{display:grid;gap:8px}.nav-btn{width:100%;min-height:52px;display:flex;align-items:center;gap:10px;padding:12px;border-radius:14px;border:1px solid transparent;background:transparent;color:var(--muted);font-weight:800;text-align:left}.nav-btn:hover{border-color:#2b4162;background:#0e1624;color:#fff}.nav-btn.active{border-color:#3d6fa8;background:linear-gradient(135deg,rgba(47,129,247,.26),rgba(231,196,119,.08));color:#fff}.nav-icon{width:26px;height:26px;border-radius:9px;display:grid;place-items:center;background:#101b2c;color:var(--gold);font-size:14px}.nav-foot{margin-top:auto}.app{padding:18px 18px 26px}.root:not(.page-files) .app{height:100vh;min-height:0;overflow:hidden;display:flex;flex-direction:column}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}h1{font-size:24px;margin:0}.sub,p{margin:4px 0;color:var(--muted)}.msg{min-height:24px;color:var(--gold);margin-top:8px}.ok{color:#9ef0b8}.err{color:#ffb4ac}.panel{border:1px solid rgba(148,163,184,.18);border-radius:16px;background:linear-gradient(180deg,rgba(18,26,39,.97),rgba(12,18,28,.98));box-shadow:0 20px 70px rgba(0,0,0,.22);padding:14px;min-width:0}.toolbar{border:1px solid rgba(148,163,184,.18);border-radius:16px;background:linear-gradient(180deg,rgba(18,26,39,.95),rgba(15,23,36,.95));padding:14px;margin-bottom:14px}.upload{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.muted{color:var(--muted)}input[type=file]{display:none}.view-title{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.view-title h2,.side h2,.main h2{font-size:18px;margin:0}.table{overflow:auto;border:1px solid #26374f;border-radius:14px}table{width:100%;border-collapse:collapse;min-width:620px}th,td{padding:12px 14px;border-bottom:1px solid #26374f;text-align:left;white-space:nowrap}th{position:sticky;top:0;background:#121d2d;color:var(--gold);z-index:1}td.name{font-weight:800;color:#fff}.value{font-variant-numeric:tabular-nums;color:#dbeafe}.file-actions,.actions{display:flex;gap:8px;flex-wrap:wrap}.file-actions a,.file-actions button{border-radius:10px;padding:8px 12px;text-decoration:none;font-weight:700}.file-actions a{border:1px solid var(--line);color:#9ef0b8;background:#142033}.badge{display:inline-flex;align-items:center;border:1px solid var(--line2);border-radius:999px;padding:3px 9px;background:var(--chip);font-size:12px}.empty{border:1px dashed #364760;border-radius:14px;padding:28px 14px;text-align:center;color:var(--muted)}.param-shell{display:grid;grid-template-columns:minmax(0,1fr) 180px;gap:14px;flex:1 1 auto;height:100%;min-height:0;align-items:stretch;overflow:hidden}.action-pane{position:sticky;top:18px;align-self:stretch;display:flex;flex-direction:column;gap:12px;padding:14px;border:1px solid rgba(148,163,184,.18);border-radius:16px;background:linear-gradient(180deg,rgba(18,26,39,.97),rgba(12,18,28,.98));box-shadow:0 20px 70px rgba(0,0,0,.22);height:100%;max-height:100%;min-height:0;overflow:hidden;align-items:stretch}.action-pane .action-btn{width:100%;flex:0 0 auto}.side{position:sticky;top:0;align-self:start;height:100vh;padding:16px 12px;border:0;border-right:1px solid rgba(148,163,184,.16);border-radius:0;background:linear-gradient(180deg,rgba(8,16,28,.98),rgba(5,10,18,.98));box-shadow:16px 0 50px rgba(0,0,0,.22);display:flex;flex-direction:column;gap:14px;overflow:hidden;color:var(--text)}.side-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:0;flex:none}.bin-list{display:grid;gap:8px;flex:1 1 auto;min-height:0;overflow-y:auto;padding-right:2px;align-content:start}.bin-row{display:grid;grid-template-columns:1fr;gap:6px;align-self:start}.bin{width:100%;text-align:left;border:1px solid transparent;border-radius:14px;background:#0e1624;padding:11px 13px;display:grid;gap:4px;min-height:72px;max-height:88px;align-self:start;align-content:center;cursor:pointer;color:inherit;font:inherit;line-height:1.25;transition:border-color .15s,background .15s}.bin:hover{border-color:#2b4162;background:#142033}.bin.active{background:linear-gradient(135deg,rgba(47,129,247,.30),rgba(31,111,235,.18));border-color:#3d6fa8;box-shadow:0 0 0 1px rgba(47,129,247,.35) inset}.bin-name{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px}.bin-count{font-size:12px;color:var(--gold);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bin-hint{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bin-meta{color:var(--muted);font-size:12px}.main{padding:14px;min-width:0;border:1px solid rgba(148,163,184,.18);border-radius:16px;background:linear-gradient(180deg,rgba(18,26,39,.97),rgba(12,18,28,.98));box-shadow:0 20px 70px rgba(0,0,0,.22);display:flex;flex-direction:column;height:100%;max-height:100%;min-height:0;overflow:hidden}.head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px;flex:0 0 auto}.action-btn{border:1px solid var(--line);border-radius:10px;padding:9px 13px;color:#fff;background:#1a2534;cursor:pointer;font-weight:700;letter-spacing:.4px}.action-btn:hover:not(:disabled){background:#243247;border-color:#3d6fa8}.action-btn:disabled{opacity:.45;cursor:not-allowed}.action-btn.primary{border:0;background:linear-gradient(135deg,var(--blue),#1f6feb)}.result{display:flex;flex-direction:column;flex:1 1 auto;min-height:0;overflow:hidden}.result-layout{display:grid;grid-template-columns:148px minmax(0,1fr);gap:14px;margin-top:6px;flex:1 1 auto;min-height:0;align-items:stretch;overflow:hidden}.param-tabs{display:grid;gap:8px;align-content:start;align-self:start;flex:0 0 auto}.subtab{width:100%;min-width:0;text-align:left;border-radius:11px;background:transparent;color:var(--muted);font-weight:800;padding:11px 12px}.subtab.active{border-color:#3d6fa8;background:linear-gradient(135deg,rgba(47,129,247,.32),rgba(231,196,119,.10));color:#fff}.subtab .num{margin-left:6px;color:var(--gold)}.result-body{min-width:0;display:flex;flex-direction:column;min-height:0;overflow:hidden}.param-table{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow:hidden}.param-table table{min-width:520px}.param-table .table-inner{flex:1 1 auto;min-height:0;overflow:auto;border:1px solid #26374f;border-radius:14px;scrollbar-gutter:stable}.param-table th{position:sticky;top:0;z-index:3;background:#121d2d}.page{display:block}#paramPage{display:flex;flex-direction:column;height:100%;min-height:0;overflow:hidden}.page.hidden,#paramPage.hidden{display:none!important}@media(max-width:900px){.root,.root.page-files{grid-template-columns:1fr}.left-nav{position:relative;height:auto;display:grid;grid-template-columns:1fr auto;align-items:center}.nav-brand{border-bottom:0;padding-bottom:4px}.nav-menu{grid-template-columns:1fr 1fr}.nav-foot{margin-top:0}.root:not(.page-files) .app{height:auto;min-height:0;overflow:visible;display:block}#paramPage{height:auto;min-height:0;overflow:visible}.param-shell{display:flex;flex-direction:column;gap:14px;align-items:stretch;height:auto;overflow:visible}.main{height:auto;max-height:none;min-height:0;overflow:visible}.result{flex:0 0 auto;overflow:visible}.result-layout{flex:0 0 auto}.result-body{overflow:visible}.param-table{flex:0 0 auto}.side{position:static;height:auto;border-right:0;border-bottom:1px solid rgba(148,163,184,.16);box-shadow:none}.bin-list{max-height:340px;flex:1 1 auto}.action-pane{position:static;height:auto;max-height:none;overflow:visible;flex-direction:row;flex-wrap:wrap}}@media(max-width:640px){.app{padding:14px 10px}.left-nav{grid-template-columns:1fr}.top,.view-title,.head{display:grid}.result-layout{grid-template-columns:1fr}.actions button,.file-actions a{width:100%;text-align:center}.nav-menu{grid-template-columns:1fr}}

/* ===== Unified parameter workspace: remove duplicated card frames ===== */
#paramPage .board-head-hidden,
#paramPage .head.board-head-hidden {
  display: none !important;
  margin: 0 !important;
  padding: 0 !important;
}

#paramPage .main,
#paramPage .action-pane {
  border: 0;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
}

#paramPage .main {
  padding: 0;
}

#paramPage .action-pane {
  padding: 0;
}

#paramPage .result-layout {
  margin-top: 0;
}

@media (max-width: 900px) {
  #paramPage .main,
  #paramPage .action-pane {
    border: 0;
    border-radius: 0;
    background: transparent;
    box-shadow: none;
    padding: 0;
  }
}

</style>
</head>
<body>
<div class="root page-files">
  <aside class="left-nav">
    <div class="nav-brand"><div class="mark"></div><div><div class="brand-title">UniEdge</div><div class="brand-sub">驱动器板卡配置平台</div></div></div>
    <nav class="nav-menu">
      <button id="navFiles" class="nav-btn active" onclick="switchPage('files')"><span class="nav-icon">📁</span><span>板卡管理</span></button>
      <button id="navParams" class="nav-btn" onclick="switchPage('params')"><span class="nav-icon">⚙</span><span>参数配置</span></button>
    </nav>
    <div class="nav-foot"><button class="ghost" onclick="logout()">退出登录</button></div>
  </aside>

  <aside class="side">
    <div class="side-head"><h2>板卡列表</h2><span id="binCount" class="badge">0</span></div>
    <div id="binList" class="bin-list"></div>
    <div id="binEmpty" class="empty hidden">暂无可配置板卡，请先到“板卡管理”界面上传。</div>
  </aside>

  <main class="app">
    <section id="filePage" class="page">
      <section class="toolbar">
        <div class="upload">
          <label class="file-label" for="file">选择 bin 文件</label>
          <input id="file" type="file" accept=".bin,application/octet-stream">
          <span id="fileName" class="muted">未选择文件</span>
          <button id="uploadBtn" class="primary" onclick="upload()">上传板卡配置</button>
          <button id="refreshBtn" onclick="loadFiles()">刷新列表</button>
        </div>
        <div id="msg" class="msg"></div>
      </section>

      <section class="panel">
        <div class="view-title"><div><h2>板卡列表</h2></div><span id="fileCount" class="badge">0</span></div>
        <div id="fileTable" class="table"><table><thead><tr><th>板卡名称</th><th>操作</th></tr></thead><tbody id="fileRows"></tbody></table></div>
      </section>
    </section>

    <section id="paramPage" class="page hidden">
      <section class="param-shell">
        <section class="main">
          <div class="head board-head-hidden hidden" aria-hidden="true">
            <div><h2 id="title">请选择一个板卡</h2><p id="hint">左侧每个板卡配置对应一个参数配置界面。</p></div>
          </div>

          <div id="parseErr" class="empty err hidden"></div>
          <div id="result" class="result hidden">
            <div class="result-layout">
              <nav class="param-tabs">
                <button id="tabControl" class="subtab active" onclick="switchParamType('control')">控制参数<span id="controlCount" class="num">0</span></button>
                <button id="tabProtection" class="subtab" onclick="switchParamType('protection')">保护参数<span id="protectionCount" class="num">0</span></button>
              </nav>
              <div class="result-body">
                <div id="paramEmpty" class="empty hidden">当前分类暂无可见参数</div>
                <div id="paramTable" class="param-table"><div class="table-inner"><table><thead><tr><th>参数名称</th><th>默认值</th></tr></thead><tbody id="paramRows"></tbody></table></div></div>
              </div>
            </div>
          </div>
        </section>

        <aside class="action-pane">
          <button class="action-btn" id="btnDefault" onclick="actDefault()" disabled>默认参数</button>
          <button class="action-btn" id="btnReadback" onclick="actReadback()" disabled>参数回读</button>
          <button class="action-btn" id="btnDownload" onclick="actDownload()" disabled>参数下载</button>
        </aside>
      </section>
    </section>
  </main>
</div>

<script>
const $=id=>document.getElementById(id);
const paramCounts={}; // path -> 已解析得到的参数数量
let allFiles=[],binFiles=[],selected=null,uploading=false,parsedParams=[],currentParamType='control',currentPage='files';
$('file').addEventListener('change',()=>{$('fileName').textContent=$('file').files[0]?'已选择：'+$('file').files[0].name:'未选择文件';});
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function setMsg(s,ok=false){$('msg').className='msg '+(ok?'ok':'');$('msg').textContent=s||''}
async function readErr(r){try{const j=await r.clone().json();return j.error||r.statusText}catch(e){return await r.text()||r.statusText}}
function xhrErrorText(x){try{const j=JSON.parse(x.responseText||'{}');return j.error||x.statusText}catch(e){return x.responseText||x.statusText||'连接失败'}}
function setBusy(b){uploading=b;$('uploadBtn').disabled=b;$('refreshBtn').disabled=b}
async function checkAuth(){try{const r=await fetch('/api/auth/status');if(!r.ok){location.href='/';return;}await loadFiles();}catch(e){location.href='/'}}
function isBin(f){return !f.is_dir&&(f.is_param_bin||/\.bin$/i.test(f.name||''));}
function boardLabel(f){return f.boardName||f.displayName||'未识别板卡配置'}
function normParamType(p){return String(p.paramType||'').toLowerCase();}
function switchPage(page){
  currentPage=page;
  $('filePage').classList.toggle('hidden',page!=='files');
  $('paramPage').classList.toggle('hidden',page!=='params');
  $('navFiles').classList.toggle('active',page==='files');
  $('navParams').classList.toggle('active',page==='params');
  document.querySelector('.root').classList.toggle('page-files',page==='files');
  if(page==='params'){
    if(!selected&&binFiles.length>0)selected=binFiles[0];
    renderBins();
    if(selected)parseSelected();
  }
}
function renderFiles(){
  $('fileCount').textContent=binFiles.length;
  $('fileTable').classList.toggle('hidden',binFiles.length===0);
  $('fileRows').innerHTML=binFiles.map(f=>{
    const label=boardLabel(f);
    return '<tr><td class="name">'+esc(label)+'</td><td><div class="file-actions"><button class="danger file-del" data-path="'+esc(f.path)+'">删除</button></div></td></tr>';
  }).join('');
  document.querySelectorAll('.file-del').forEach(b=>b.onclick=()=>deleteFileByPath(b.dataset.path));
}
function renderBins(){
  binFiles=allFiles.filter(isBin).sort((a,b)=>boardLabel(a).localeCompare(boardLabel(b),'zh-CN'));
  $('binCount').textContent=binFiles.length;
  $('binEmpty').classList.toggle('hidden',binFiles.length>0);
  $('binList').innerHTML=binFiles.map(f=>{
    const isActive=!!(selected&&selected.path===f.path);
    const count=paramCounts[f.path];
    const countText=count!=null?'共 '+count+' 项参数':'尚未解析';
    return '<div class="bin-row">'
      +'<button class="bin'+(isActive?' active':'')+'" data-path="'+esc(f.path)+'" title="'+esc(boardLabel(f))+'">'
      +'<span class="bin-name">'+esc(boardLabel(f))+'</span>'
      +'<span class="bin-count">'+esc(countText)+'</span>'
      +'<span class="bin-hint">点击查看参数</span>'
      +'</button></div>';
  }).join('');
  document.querySelectorAll('.bin').forEach(b=>b.onclick=()=>selectBin(b.dataset.path,true));
}
function selectBin(path,parseNow=true){
  selected=binFiles.find(f=>f.path===path)||null;
  renderBins();
  if(!selected)return;
  $('title').textContent=boardLabel(selected);
  $('hint').textContent='正在解析板卡配置...';
  $('btnDefault').disabled=false;
  $('btnReadback').disabled=false;
  $('btnDownload').disabled=false;
  if(parseNow)parseSelected();
}
async function loadFiles(){
  if(uploading){setMsg('文件正在上传，请稍后刷新');return;}
  setMsg('正在加载板卡列表...');
  try{
    const r=await fetch('/files');
    const j=await r.json();
    if(r.status===401){location.href='/';return;}
    if(!r.ok)throw new Error(j.error||r.statusText);
    allFiles=(j.files||[]).filter(f=>f.name!=='System Volume Information');
    binFiles=allFiles.filter(isBin).sort((a,b)=>boardLabel(a).localeCompare(boardLabel(b),'zh-CN'));
    if(selected){const still=binFiles.find(f=>f.path===selected.path);selected=still||null;}
    renderFiles();renderBins();
    setMsg('板卡列表已更新，共 '+binFiles.length+' 个板卡配置',true);
    if(currentPage==='params'&&!selected&&binFiles.length>0)selectBin(binFiles[0].path,true);
  }catch(e){setMsg('加载失败：'+e.message)}
}
function upload(){
  if(uploading){setMsg('文件正在上传，请稍候');return;}
  const f=$('file').files[0];
  if(!f){setMsg('请先选择一个 bin 文件');return;}
  if(!/\.bin$/i.test(f.name)){setMsg('请上传 .bin 文件');return;}
  setBusy(true);setMsg('准备上传...');
  const x=new XMLHttpRequest();
  x.open('POST','/upload?filename='+encodeURIComponent(f.name),true);
  x.upload.onprogress=e=>{setMsg(e.lengthComputable?'正在上传 '+Math.floor(e.loaded*100/e.total)+'%':'正在上传文件...')};
  x.onload=()=>{setBusy(false);if(x.status===401){location.href='/';return;}if(x.status<200||x.status>=300){setMsg('上传失败：'+xhrErrorText(x));return;}setMsg('上传完成，正在刷新板卡名称...',true);$('file').value='';$('fileName').textContent='未选择文件';loadFiles()};
  x.onerror=()=>{setBusy(false);setMsg('上传失败：连接中断')};
  x.ontimeout=()=>{setBusy(false);setMsg('上传失败：连接超时')};
  x.timeout=0;x.send(f);
}
function switchParamType(type){currentParamType=type;renderParamTable();}
function renderParamTable(){
  const control=parsedParams.filter(p=>normParamType(p)==='control');
  const protection=parsedParams.filter(p=>normParamType(p)==='protection');
  $('controlCount').textContent=control.length;
  $('protectionCount').textContent=protection.length;
  $('tabControl').classList.toggle('active',currentParamType==='control');
  $('tabProtection').classList.toggle('active',currentParamType==='protection');
  const list=(currentParamType==='control'?control:protection).slice();
  $('paramRows').innerHTML=list.map(p=>'<tr><td class="name">'+esc(p.name)+'</td><td class="value">'+esc(p.defaultValue)+'</td></tr>').join('');
  $('paramEmpty').classList.toggle('hidden',list.length>0);
  $('paramTable').classList.toggle('hidden',list.length===0);
}
async function parseSelected(){
  if(!selected)return;
  $('parseErr').classList.add('hidden');$('result').classList.add('hidden');
  parsedParams=[];
  $('title').textContent=boardLabel(selected);
  $('hint').textContent='ESP32 正在解密并解析...';
  $('btnDefault').disabled=false;$('btnReadback').disabled=false;$('btnDownload').disabled=false;
  try{
    const r=await fetch('/api/bin/parse?path='+encodeURIComponent(selected.path));
    const j=await r.json();
    if(r.status===401){location.href='/';return;}
    if(!r.ok||!j.ok)throw new Error(j.error||r.statusText);
    if(j.boardName){selected.boardName=j.boardName;selected.displayName=j.boardName;$('title').textContent=j.boardName;renderFiles();renderBins();}
    parsedParams=(j.parameters||[]).slice();
    paramCounts[selected.path]=(typeof j.visibleCount==='number')?j.visibleCount:parsedParams.length;
    renderBins();
    currentParamType='control';
    renderParamTable();
    $('result').classList.remove('hidden');
    $('hint').textContent='';
  }catch(e){$('parseErr').textContent='解析失败：'+e.message;$('parseErr').classList.remove('hidden');$('hint').textContent='解析失败，请确认该文件由新版 tools 生成且密钥一致';}
}
async function deleteFileByPath(path){
  const f=binFiles.find(x=>x.path===path);
  const label=f?boardLabel(f):'该板卡配置';
  if(!confirm('确认删除板卡配置 '+label+' 吗？'))return;
  setMsg('正在删除板卡配置...');
  const body='path='+encodeURIComponent(path);
  const r=await fetch('/delete',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  if(r.status===401){location.href='/';return;}
  if(!r.ok){setMsg('删除失败：'+await readErr(r));return;}
  if(selected&&selected.path===path){selected=null;parsedParams=[];delete paramCounts[path];$('result').classList.add('hidden');$('parseErr').classList.add('hidden');$('title').textContent='请选择一个板卡';}
  setMsg('删除完成',true);loadFiles();
}
async function logout(){try{await fetch('/api/logout',{method:'POST'})}catch(e){}location.href='/'}
function actDefault(){if(!selected)return;}
function actReadback(){if(!selected)return;}
function actDownload(){if(!selected)return;}
checkAuth();
</script>
